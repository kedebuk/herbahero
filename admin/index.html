<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Management Dashboard</title>
<link rel="stylesheet" href="../assets/style.css">
<script>
const ADMIN_CONFIG = {
  password: "admin123",
  webhookUrl: "https://script.google.com/macros/s/XXXXX/exec"
};
</script>
</head>
<body>

<!-- Login Screen -->
<div class="admin-login" id="loginScreen">
  <div class="login-box">
    <h1>🔐 Dashboard Login</h1>
    <p>Masukkan password untuk akses dashboard</p>
    <input type="password" id="passInput" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Masuk</button>
    <div class="login-error" id="loginErr">Password salah</div>
  </div>
</div>

<!-- Dashboard -->
<div class="admin-wrap" id="dashboard">
  <div class="admin-header">
    <h1>📦 Order Management</h1>
    <div style="display:flex;gap:8px;align-items:center">
      <button onclick="loadOrders()" style="padding:6px 12px;background:#dbeafe;border:1px solid #2563eb;border-radius:6px;cursor:pointer;font-size:.85rem;color:#2563eb">🔄 Refresh</button>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="stats-row" style="grid-template-columns:repeat(auto-fit,minmax(130px,1fr))">
    <div class="stat-card total"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total Order</div></div>
    <div class="stat-card pending"><div class="stat-num" id="statPending">0</div><div class="stat-label">Pending</div></div>
    <div class="stat-card process"><div class="stat-num" id="statProcess">0</div><div class="stat-label">Diproses</div></div>
    <div class="stat-card done"><div class="stat-num" id="statDone">0</div><div class="stat-label">Selesai</div></div>
    <div class="stat-card" style="border-left:3px solid #2563eb"><div class="stat-num" id="statRevenue" style="color:#2563eb;font-size:1.2rem">Rp 0</div><div class="stat-label">Total Revenue</div></div>
  </div>

  <div class="admin-toolbar">
    <input type="text" id="searchInput" placeholder="Cari nama / WA / produk..." oninput="filterOrders()">
    <select id="statusFilter" onchange="filterOrders()">
      <option value="">Semua Status</option>
      <option value="Pending">🟡 Pending</option>
      <option value="Diproses">🔵 Diproses</option>
      <option value="Dikirim">📦 Dikirim</option>
      <option value="Selesai">✅ Selesai</option>
    </select>
    <input type="date" id="dateFrom" onchange="filterOrders()" title="Dari tanggal" style="max-width:150px">
    <input type="date" id="dateTo" onchange="filterOrders()" title="Sampai tanggal" style="max-width:150px">
    <button class="btn-export" onclick="exportCSV()">📥 Export CSV</button>
  </div>

  <div class="orders-table-wrap">
    <div id="loadingState" style="text-align:center;padding:40px;color:#9ca3af">Memuat data...</div>
    <table class="orders-table" id="ordersTable" style="display:none">
      <thead>
        <tr><th>No</th><th>Tanggal</th><th>Nama</th><th>WA</th><th>Produk</th><th>Qty</th><th>Total</th><th>Bayar</th><th>Status</th><th>Aksi</th></tr>
      </thead>
      <tbody id="ordersBody"></tbody>
    </table>
    <div class="empty-state" id="emptyState" style="display:none">
      <div style="font-size:3rem;margin-bottom:12px">📭</div>
      <h3 style="font-size:1rem;color:#6b7280;margin-bottom:4px">Belum ada order</h3>
      <p style="font-size:.88rem;color:#9ca3af">Order dari landing page akan muncul di sini.</p>
    </div>
  </div>
</div>

<!-- Order Detail Modal -->
<div class="modal-overlay" id="orderModal">
  <div class="modal-box">
    <h3>Detail Order <button class="modal-close" onclick="closeModal()">&times;</button></h3>
    <div id="modalContent"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function(){
  var allOrders = [];
  var filteredOrders = [];

  // Check session
  if(localStorage.getItem('admin_logged_in')==='true'){showDashboard();}

  window.doLogin = function(){
    var pass = document.getElementById('passInput').value;
    if(pass === ADMIN_CONFIG.password){
      localStorage.setItem('admin_logged_in','true');
      showDashboard();
    } else {
      var err = document.getElementById('loginErr');
      err.style.display='block';
      setTimeout(function(){err.style.display='none';},2000);
    }
  };

  window.doLogout = function(){
    localStorage.removeItem('admin_logged_in');
    document.getElementById('dashboard').style.display='none';
    document.getElementById('loginScreen').style.display='flex';
  };

  function showDashboard(){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('dashboard').style.display='block';
    loadOrders();
  }

  window.loadOrders = function(){
    document.getElementById('loadingState').style.display='block';
    document.getElementById('ordersTable').style.display='none';
    document.getElementById('emptyState').style.display='none';

    fetch(ADMIN_CONFIG.webhookUrl + '?action=get_orders')
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.success && d.orders){
        allOrders = d.orders.reverse(); // newest first
        updateStats();
        filterOrders();
      } else {
        document.getElementById('loadingState').innerHTML = '<span style="color:#dc2626">Gagal memuat: '+(d.error||'Unknown error')+'</span>';
      }
    })
    .catch(function(err){
      document.getElementById('loadingState').innerHTML = '<span style="color:#dc2626">Error koneksi: '+err.message+'<br><small>Pastikan URL webhook sudah benar dan GAS sudah di-deploy</small></span>';
    });
  };

  function updateStats(){
    var total=allOrders.length, pending=0, process=0, done=0, revenue=0;
    allOrders.forEach(function(o){
      var s = (o.status||'').toLowerCase();
      if(s==='pending') pending++;
      else if(s==='diproses') process++;
      else if(s==='selesai'||s==='dikirim') done++;
      revenue += parseInt(o.total)||0;
    });
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statPending').textContent = pending;
    document.getElementById('statProcess').textContent = process;
    document.getElementById('statDone').textContent = done;
    document.getElementById('statRevenue').textContent = 'Rp '+revenue.toLocaleString('id-ID');
  }

  function renderOrders(orders){
    document.getElementById('loadingState').style.display='none';
    if(!orders.length){
      document.getElementById('ordersTable').style.display='none';
      document.getElementById('emptyState').style.display='block';
      return;
    }
    document.getElementById('ordersTable').style.display='table';
    document.getElementById('emptyState').style.display='none';
    var html='';
    orders.forEach(function(o,i){
      var badge='badge-pending',statusLabel=o.status||'Pending';
      var s=(o.status||'').toLowerCase();
      if(s==='diproses') badge='badge-process';
      else if(s==='dikirim') badge='badge-shipped';
      else if(s==='selesai') badge='badge-done';
      html += '<tr style="cursor:pointer" onclick="showOrderDetail('+i+')">';
      html += '<td>'+(i+1)+'</td>';
      html += '<td style="white-space:nowrap">'+(o.timestamp||'-')+'</td>';
      html += '<td><strong>'+esc(o.nama||'')+'</strong></td>';
      html += '<td><a href="https://wa.me/'+cleanWa(o.wa)+'" target="_blank" onclick="event.stopPropagation()">'+esc(o.wa||'')+'</a></td>';
      html += '<td>'+esc(o.produk||'')+'</td>';
      html += '<td>'+(o.qty||1)+'</td>';
      html += '<td><strong>Rp '+(parseInt(o.total)||0).toLocaleString('id-ID')+'</strong></td>';
      html += '<td>'+esc(o.metodebayar||o.metodeBayar||'')+'</td>';
      html += '<td><span class="badge '+badge+'">'+statusLabel+'</span></td>';
      html += '<td><select class="status-select" onclick="event.stopPropagation()" onchange="updateStatus(\''+o.id+'\',this.value)">';
      ['Pending','Diproses','Dikirim','Selesai'].forEach(function(st){
        html += '<option value="'+st+'"'+(st===statusLabel?' selected':'')+'>'+st+'</option>';
      });
      html += '</select></td></tr>';
    });
    document.getElementById('ordersBody').innerHTML = html;
  }

  window.filterOrders = function(){
    var q = document.getElementById('searchInput').value.toLowerCase();
    var sf = document.getElementById('statusFilter').value;
    var dateFrom = document.getElementById('dateFrom').value;
    var dateTo = document.getElementById('dateTo').value;

    filteredOrders = allOrders.filter(function(o){
      var matchSearch = !q || (o.nama||'').toLowerCase().indexOf(q)>-1 || (o.wa||'').indexOf(q)>-1 || (o.produk||'').toLowerCase().indexOf(q)>-1;
      var matchStatus = !sf || o.status===sf;
      var matchDate = true;
      if(dateFrom || dateTo){
        var orderDate = parseOrderDate(o.timestamp||'');
        if(orderDate){
          if(dateFrom){
            var from = new Date(dateFrom); from.setHours(0,0,0,0);
            if(orderDate < from) matchDate = false;
          }
          if(dateTo){
            var to = new Date(dateTo); to.setHours(23,59,59,999);
            if(orderDate > to) matchDate = false;
          }
        }
      }
      return matchSearch && matchStatus && matchDate;
    });
    renderOrders(filteredOrders);
  };

  function parseOrderDate(ts){
    if(!ts) return null;
    var d = new Date(ts);
    if(!isNaN(d.getTime())) return d;
    // Indonesian format "DD/MM/YYYY HH:mm:ss"
    var m = ts.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if(m) return new Date(parseInt(m[3]), parseInt(m[2])-1, parseInt(m[1]));
    return null;
  }

  /* Order detail modal */
  window.showOrderDetail = function(idx){
    var o = filteredOrders[idx];
    if(!o) return;
    var h = '';
    var fields = [
      ['ID Order', o.id||'-'],
      ['Tanggal', o.timestamp||'-'],
      ['Nama', o.nama||'-'],
      ['WhatsApp', o.wa||'-'],
      ['Alamat', o.alamat||'-'],
      ['Kecamatan', o.kecamatan||'-'],
      ['Kota', o.kota||'-'],
      ['Provinsi', o.provinsi||'-'],
      ['Wilayah', o.wilayah||'-'],
      ['Produk', o.produk||'-'],
      ['Qty', ''+(o.qty||1)],
      ['Ongkir', 'Rp '+(parseInt(o.ongkir)||0).toLocaleString('id-ID')],
      ['Total', 'Rp '+(parseInt(o.total)||0).toLocaleString('id-ID')],
      ['Pembayaran', o.metodebayar||o.metodeBayar||'-'],
      ['Catatan', o.catatan||'-'],
      ['LP Source', o.lpsource||o.lpSource||'-'],
      ['UTM Source', o.utm_source||'-'],
      ['UTM Medium', o.utm_medium||'-'],
      ['UTM Campaign', o.utm_campaign||'-'],
      ['Status', o.status||'Pending']
    ];
    fields.forEach(function(f){
      if(f[1] && f[1]!=='-'){
        h += '<div class="modal-row"><span class="lbl">'+f[0]+'</span><span class="val">'+esc(f[1])+'</span></div>';
      }
    });
    h += '<div style="margin-top:16px;text-align:center"><a href="https://wa.me/'+cleanWa(o.wa)+'" target="_blank" style="display:inline-block;padding:10px 20px;background:#25d366;color:#fff;border-radius:8px;font-weight:600;text-decoration:none;font-size:.9rem">💬 Chat via WhatsApp</a></div>';
    document.getElementById('modalContent').innerHTML = h;
    document.getElementById('orderModal').classList.add('open');
  };

  window.closeModal = function(){
    document.getElementById('orderModal').classList.remove('open');
  };

  // Escape key closes modal
  document.addEventListener('keydown', function(e){
    if(e.key==='Escape') closeModal();
  });

  // Click overlay to close
  document.getElementById('orderModal').addEventListener('click', function(e){
    if(e.target===this) closeModal();
  });

  window.updateStatus = function(id, status){
    fetch(ADMIN_CONFIG.webhookUrl + '?action=update_status&id='+encodeURIComponent(id)+'&status='+encodeURIComponent(status))
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.success){
        allOrders.forEach(function(o){if(o.id===id) o.status=status;});
        updateStats();
        filterOrders();
        showToast('Status berhasil diupdate ke "'+status+'"', 'toast-success');
      } else {
        showToast('Gagal update: '+(d.error||''), 'toast-error');
      }
    })
    .catch(function(){showToast('Error koneksi', 'toast-error');});
  };

  /* Toast notification */
  function showToast(msg, cls){
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast '+(cls||'toast-info')+' show';
    clearTimeout(showToast._timer);
    showToast._timer = setTimeout(function(){t.classList.remove('show');}, 3000);
  }

  window.exportCSV = function(){
    if(!allOrders.length){alert('Tidak ada data');return;}
    var headers = ['ID','Tanggal','Nama','WA','Alamat','Kecamatan','Kota','Provinsi','Wilayah','Produk','Qty','Ongkir','Total','MetodeBayar','Catatan','Status','UTM_Source','UTM_Medium','UTM_Campaign'];
    var rows = [headers.join(',')];
    allOrders.forEach(function(o){
      rows.push([o.id,'"'+(o.timestamp||'')+'"','"'+esc(o.nama||'')+'"',o.wa,'"'+esc(o.alamat||'')+'"','"'+esc(o.kecamatan||'')+'"','"'+esc(o.kota||'')+'"','"'+esc(o.provinsi||'')+'"','"'+esc(o.wilayah||'')+'"','"'+esc(o.produk||'')+'"',o.qty,o.ongkir,o.total,o.metodebayar||o.metodeBayar,'"'+esc(o.catatan||'')+'"',o.status,o.utm_source||'',o.utm_medium||'',o.utm_campaign||''].join(','));
    });
    var blob = new Blob([rows.join('\n')],{type:'text/csv'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'orders_'+new Date().toISOString().slice(0,10)+'.csv';
    a.click();
  };

  function esc(s){return s?String(s).replace(/"/g,'""'):'';}
  function cleanWa(w){return (w||'').replace(/[^0-9]/g,'').replace(/^0/,'62');}
})();
</script>
</body>
</html>
