name = "herbahero"
main = "worker/index.js"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "KV"
id = "FILL_AFTER_CREATE"
preview_id = "FILL_AFTER_CREATE"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "herbahero-media"

[vars]
MEDIA_BASE_URL = "https://media.herbahero.my.id"
