<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LP Builder</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f3f4f6;color:#1f2937;height:100vh;overflow:hidden}
.builder{display:flex;flex-direction:column;height:100vh}

/* Header */
.builder-header{display:flex;align-items:center;gap:16px;padding:12px 20px;background:#fff;border-bottom:1px solid #e5e7eb;flex-shrink:0;z-index:10}
.builder-header h1{font-size:1.05rem;font-weight:700}
.back-link{color:#6b7280;text-decoration:none;font-size:.85rem;white-space:nowrap}
.back-link:hover{color:#111}

/* Body */
.builder-body{display:flex;flex:1;overflow:hidden}

/* Sidebar */
.sidebar{width:320px;min-width:260px;overflow-y:auto;background:#fff;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;gap:0}

.panel{border-bottom:1px solid #e5e7eb}
.panel-head{padding:12px 16px;font-weight:700;font-size:.88rem;color:#374151;background:#f9fafb;display:flex;align-items:center;gap:6px}
.panel-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px}

/* Drop zone — file input inside label, paling reliable */
.drop-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px dashed #d1d5db;border-radius:10px;padding:24px 16px;cursor:pointer;text-align:center;transition:border-color .2s,background .2s;background:#fafafa;position:relative;min-height:120px}
.drop-zone:hover,.drop-zone.over{border-color:#2563eb;background:#eff6ff}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;font-size:0}
.dz-icon{font-size:2rem;pointer-events:none}
.dz-text{font-size:.85rem;color:#6b7280;margin-top:6px;pointer-events:none}

.photo-done{display:none;position:relative}
.photo-done img{width:100%;border-radius:8px;display:block;max-height:180px;object-fit:cover}
.photo-done .rm-btn{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:5px;padding:4px 9px;font-size:.75rem;cursor:pointer}

/* Toggle blocks */
.toggle-block{border:1px solid #e5e7eb;border-radius:8px;overflow:hidden}
.toggle-head{display:flex;align-items:center;gap:10px;padding:11px 13px;cursor:pointer;background:#f9fafb;user-select:none}
.toggle-head:hover{background:#f3f4f6}
.toggle-head input[type=checkbox]{width:17px;height:17px;accent-color:#2563eb;cursor:pointer;flex-shrink:0}
.toggle-head .tl{font-weight:600;font-size:.88rem}
.toggle-content{padding:12px 14px;border-top:1px solid #e5e7eb;display:flex;flex-direction:column;gap:10px}

/* Form elements */
.fg label{display:block;font-size:.82rem;font-weight:600;color:#374151;margin-bottom:3px}
.fg .req{color:#dc2626}
.fg input[type=text],.fg input[type=tel],.fg input[type=number],.fg select,.fg textarea{width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:.88rem;font-family:inherit;background:#fff}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.fg textarea{resize:vertical;min-height:60px}
.fg input[type=color]{padding:2px;height:34px;border-radius:7px;cursor:pointer}

.opt-row{display:flex;gap:5px;margin-bottom:4px}
.opt-row input{flex:1}
.btn-rm{background:none;border:1px solid #fca5a5;color:#dc2626;border-radius:5px;padding:4px 8px;font-size:.78rem;cursor:pointer;flex-shrink:0}
.btn-add{width:100%;background:none;border:1px dashed #d1d5db;color:#6b7280;border-radius:7px;padding:6px;font-size:.82rem;cursor:pointer;margin-top:2px}
.btn-add:hover{border-color:#2563eb;color:#2563eb}

.rate-table{width:100%;border-collapse:collapse;font-size:.78rem}
.rate-table th{background:#f3f4f6;padding:5px 6px;text-align:left;color:#6b7280;font-size:.75rem;border-bottom:1px solid #e5e7eb}
.rate-table td{padding:3px}
.rate-table td input{width:100%;padding:4px 5px;border:1px solid #d1d5db;border-radius:4px;font-size:.78rem}

/* Generate section */
.gen-section{padding:14px 16px;display:flex;flex-direction:column;gap:8px;margin-top:auto}
.btn-gen{padding:12px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:.95rem;font-weight:700;cursor:pointer;width:100%}
.btn-gen:hover{background:#1d4ed8}
.btn-copy{padding:9px;background:#f3f4f6;color:#374151;border:1px solid #d1d5db;border-radius:8px;font-size:.88rem;cursor:pointer;width:100%}
.btn-copy:hover{background:#e5e7eb}
.gen-note{font-size:.73rem;color:#9ca3af;text-align:center}

/* Preview */
.preview-pane{flex:1;display:flex;flex-direction:column;min-width:0;background:#e5e7eb}
.preview-bar{padding:8px 14px;background:#fff;border-bottom:1px solid #e5e7eb;font-size:.82rem;font-weight:600;color:#374151;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.preview-bar span{font-size:.73rem;color:#9ca3af;font-weight:400}
#previewFrame{flex:1;border:none;background:#fff}

@media(max-width:700px){
  body{height:auto;overflow:auto}
  .builder{height:auto;min-height:100vh}
  .builder-body{flex-direction:column;overflow:visible}
  .sidebar{width:100%;min-width:unset;border-right:none;border-bottom:1px solid #e5e7eb;max-height:none;overflow-y:visible}
  .preview-pane{min-height:500px}
  #previewFrame{min-height:500px}
}
</style>
</head>
<body>
<div class="builder">

<div class="builder-header">
  <a href="../" class="back-link">← Kembali</a>
  <h1>🛠️ LP Builder</h1>
</div>

<div class="builder-body">

<!-- SIDEBAR -->
<div class="sidebar">

  <!-- 1. Foto -->
  <div class="panel">
    <div class="panel-head">📷 1. Upload Foto Produk</div>
    <div class="panel-body">
      <!-- Label wrapping file input = paling reliable, tidak butuh JS click -->
      <label class="drop-zone" id="dropZone">
        <div class="dz-icon">🖼️</div>
        <div class="dz-text">Drag &amp; drop atau<br><strong>klik di sini</strong> untuk pilih foto</div>
        <input type="file" id="heroFile" accept="image/*">
      </label>
      <div class="photo-done" id="photoDone">
        <img id="heroPreview" alt="Foto produk">
        <button class="rm-btn" type="button" id="rmPhoto">✕ Ganti</button>
      </div>
    </div>
  </div>

  <!-- 2. Elemen Tambahan -->
  <div class="panel">
    <div class="panel-head">⚙️ 2. Elemen Tambahan (opsional)</div>
    <div class="panel-body">

      <!-- Pixel -->
      <div class="toggle-block">
        <div class="toggle-head" id="pixelHead">
          <input type="checkbox" id="enablePixel">
          <span class="tl">📊 Facebook Pixel</span>
        </div>
        <div class="toggle-content" id="pixelBody" style="display:none">
          <div class="fg">
            <label>Pixel ID</label>
            <input type="text" id="bPixelId" placeholder="Contoh: 1234567890123456">
          </div>
        </div>
      </div>

      <!-- Form Order -->
      <div class="toggle-block">
        <div class="toggle-head" id="formHead">
          <input type="checkbox" id="enableForm">
          <span class="tl">📋 Form Order</span>
        </div>
        <div class="toggle-content" id="formBody" style="display:none">
          <div class="fg">
            <label>Nama Produk</label>
            <input type="text" id="bProductName" value="Nama Produk">
          </div>
          <div class="fg">
            <label>Harga Dasar (Rp)</label>
            <input type="number" id="bPrice" value="99000">
          </div>
          <div class="fg">
            <label>Pilihan Paket</label>
            <div id="optionsList"></div>
            <button class="btn-add" type="button" id="btnAddOpt">+ Tambah Paket</button>
          </div>
          <div class="fg">
            <label>Nomor WA CS</label>
            <input type="tel" id="bWaNumber" placeholder="628123456789">
          </div>
          <div class="fg">
            <label>Webhook Google Apps Script</label>
            <input type="text" id="bWebhook" placeholder="https://script.google.com/macros/s/.../exec">
          </div>
          <div class="fg">
            <label>Tabel Ongkir</label>
            <table class="rate-table">
              <thead><tr><th>Wilayah</th><th>Ongkir</th><th>Estimasi</th><th></th></tr></thead>
              <tbody id="ratesBody"></tbody>
            </table>
            <button class="btn-add" type="button" id="btnAddRate">+ Tambah Wilayah</button>
          </div>
          <div class="fg">
            <label>Warna Tema</label>
            <input type="color" id="bColor" value="#2563eb">
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- 3. Download -->
  <div class="gen-section">
    <button class="btn-gen" type="button" id="btnDownload">📥 Download HTML</button>
    <button class="btn-copy" type="button" id="btnCopy">📋 Copy HTML</button>
    <p class="gen-note">File HTML self-contained — foto sudah embed, siap upload ke Vercel / GitHub Pages</p>
  </div>

</div>

<!-- PREVIEW -->
<div class="preview-pane">
  <div class="preview-bar">Preview <span>Auto-update saat edit</span></div>
  <iframe id="previewFrame" title="Preview LP"></iframe>
</div>

</div>
</div>

<script>
(function () {
  'use strict';

  /* ── State ── */
  var heroBase64 = '';
  var options = ['Paket 1 (1 pcs) — Rp 99.000', 'Paket 2 (2 pcs) — Rp 179.000'];
  var rates = [
    { wilayah: 'Jabodetabek',    ongkir: 15000, estimasi: '1-2 hari' },
    { wilayah: 'Jawa',           ongkir: 20000, estimasi: '2-3 hari' },
    { wilayah: 'Sumatera',       ongkir: 25000, estimasi: '3-5 hari' },
    { wilayah: 'Kalimantan',     ongkir: 30000, estimasi: '4-6 hari' },
    { wilayah: 'Sulawesi',       ongkir: 30000, estimasi: '4-6 hari' },
    { wilayah: 'Bali & NTB',     ongkir: 25000, estimasi: '3-5 hari' },
    { wilayah: 'Papua & Maluku', ongkir: 45000, estimasi: '7-14 hari' }
  ];

  /* ── Restore draft (tanpa heroBase64 agar tidak overflow localStorage) ── */
  try {
    var d = JSON.parse(localStorage.getItem('lpb3') || 'null');
    if (d) {
      if (d.pn)  el('bProductName').value = d.pn;
      if (d.pr)  el('bPrice').value       = d.pr;
      if (d.px)  el('bPixelId').value     = d.px;
      if (d.wh)  el('bWebhook').value     = d.wh;
      if (d.wa)  el('bWaNumber').value    = d.wa;
      if (d.cl)  el('bColor').value       = d.cl;
      if (d.ep)  { el('enablePixel').checked = true; show('pixelBody'); }
      if (d.ef)  { el('enableForm').checked  = true; show('formBody');  }
      if (d.opts) options = d.opts;
      if (d.rts)  rates   = d.rts;
    }
  } catch (e) {}

  renderOptions();
  renderRates();

  /* ── File upload (paling reliable: input[type=file] di dalam label) ── */
  el('heroFile').addEventListener('change', function () {
    if (this.files && this.files[0]) readPhoto(this.files[0]);
  });

  /* Drag & drop extra handler di atas label */
  var dz = el('dropZone');
  dz.addEventListener('dragover',  function (e) { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', function ()  { dz.classList.remove('over'); });
  dz.addEventListener('drop', function (e) {
    e.preventDefault();
    dz.classList.remove('over');
    var f = e.dataTransfer.files[0];
    if (f) readPhoto(f);
  });

  el('rmPhoto').addEventListener('click', function (e) {
    e.stopPropagation();
    heroBase64 = '';
    el('heroFile').value = '';
    el('photoSrc', el('photoDone').querySelector('img'));
    el('photoDone').style.display  = 'none';
    dz.style.display = '';
    refresh();
  });

  function readPhoto(file) {
    if (!file.type.startsWith('image/')) return;
    var r = new FileReader();
    r.onload = function (e) {
      heroBase64 = e.target.result;
      el('heroPreview').src = heroBase64;
      dz.style.display               = 'none';
      el('photoDone').style.display  = 'block';
      refresh();
    };
    r.readAsDataURL(file);
  }

  /* ── Toggle Pixel / Form ── */
  ['pixelHead', 'formHead'].forEach(function (headId) {
    el(headId).addEventListener('click', function (e) {
      var isPixel = headId === 'pixelHead';
      var cbId    = isPixel ? 'enablePixel' : 'enableForm';
      var bodyId  = isPixel ? 'pixelBody'   : 'formBody';
      if (e.target.type === 'checkbox') return; // checkbox handles itself
      el(cbId).checked = !el(cbId).checked;
      el(bodyId).style.display = el(cbId).checked ? 'block' : 'none';
      refresh();
    });
  });

  el('enablePixel').addEventListener('change', function () {
    el('pixelBody').style.display = this.checked ? 'block' : 'none';
    refresh();
  });
  el('enableForm').addEventListener('change', function () {
    el('formBody').style.display = this.checked ? 'block' : 'none';
    refresh();
  });

  /* Auto-refresh on any input change */
  document.querySelectorAll('input, select, textarea').forEach(function (inp) {
    inp.addEventListener('input',  refresh);
    inp.addEventListener('change', refresh);
  });

  /* ── Options ── */
  el('btnAddOpt').addEventListener('click', function () {
    options.push('Paket baru');
    renderOptions();
    refresh();
  });

  function renderOptions() {
    el('optionsList').innerHTML = options.map(function (o, i) {
      return '<div class="opt-row">'
        + '<input value="' + esc(o) + '" data-oi="' + i + '">'
        + '<button class="btn-rm" type="button" data-ri="' + i + '">&times;</button>'
        + '</div>';
    }).join('');
    el('optionsList').querySelectorAll('input').forEach(function (inp) {
      inp.addEventListener('input', function () {
        options[+this.dataset.oi] = this.value;
        refresh();
      });
    });
    el('optionsList').querySelectorAll('.btn-rm').forEach(function (btn) {
      btn.addEventListener('click', function () {
        options.splice(+this.dataset.ri, 1);
        renderOptions();
        refresh();
      });
    });
  }

  /* ── Rates ── */
  el('btnAddRate').addEventListener('click', function () {
    rates.push({ wilayah: 'Wilayah Baru', ongkir: 20000, estimasi: '3-5 hari' });
    renderRates();
    refresh();
  });

  function renderRates() {
    el('ratesBody').innerHTML = rates.map(function (r, i) {
      return '<tr>'
        + '<td><input value="' + esc(r.wilayah)   + '" data-ri="' + i + '" data-rk="wilayah"></td>'
        + '<td><input type="number" value="' + r.ongkir  + '" data-ri="' + i + '" data-rk="ongkir"></td>'
        + '<td><input value="' + esc(r.estimasi)  + '" data-ri="' + i + '" data-rk="estimasi"></td>'
        + '<td><button class="btn-rm" type="button" data-rr="' + i + '">&times;</button></td>'
        + '</tr>';
    }).join('');
    el('ratesBody').querySelectorAll('input').forEach(function (inp) {
      inp.addEventListener('input', function () {
        var k = this.dataset.rk, v = this.value;
        rates[+this.dataset.ri][k] = k === 'ongkir' ? (parseInt(v) || 0) : v;
        refresh();
      });
    });
    el('ratesBody').querySelectorAll('.btn-rm').forEach(function (btn) {
      btn.addEventListener('click', function () {
        rates.splice(+this.dataset.rr, 1);
        renderRates();
        refresh();
      });
    });
  }

  /* ── Refresh / save ── */
  var timer;
  function refresh() {
    saveDraft();
    clearTimeout(timer);
    timer = setTimeout(doPreview, 350);
  }

  function saveDraft() {
    try {
      localStorage.setItem('lpb3', JSON.stringify({
        pn: gv('bProductName'), pr: gv('bPrice'),
        px: gv('bPixelId'),     wh: gv('bWebhook'),
        wa: gv('bWaNumber'),    cl: gv('bColor'),
        ep: el('enablePixel').checked,
        ef: el('enableForm').checked,
        opts: options.slice(),  rts: rates.slice()
      }));
    } catch (e) {}
  }

  function doPreview() {
    el('previewFrame').srcdoc = buildHTML();
  }

  /* ── HTML Generator ── */
  function buildHTML() {
    var usePixel = el('enablePixel').checked;
    var useForm  = el('enableForm').checked;
    var color    = gv('bColor') || '#2563eb';
    var pixelId  = gv('bPixelId');
    var produk   = gv('bProductName') || 'Produk';

    /* Placeholder SVG kalau belum ada foto */
    var imgSrc = heroBase64 ||
      'data:image/svg+xml,' + encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600">'
        + '<rect width="100%" height="100%" fill="#e5e7eb"/>'
        + '<text x="50%" y="50%" text-anchor="middle" dy=".3em" '
        + 'font-family="sans-serif" font-size="28" fill="#9ca3af">Upload foto produk</text>'
        + '</svg>'
      );

    var html = '<!DOCTYPE html>\n<html lang="id">\n<head>\n'
      + '<meta charset="UTF-8">\n'
      + '<meta name="viewport" content="width=device-width, initial-scale=1.0">\n'
      + '<title>' + esc(produk) + '</title>\n'
      + '<style>' + pageCSS(color) + '</style>\n'
      + '</head>\n<body>\n';

    /* Pixel */
    if (usePixel && pixelId.trim()) {
      html += pixelSnippet(pixelId.trim());
    }

    /* Foto utama */
    html += '<div class="hero"><img src="' + imgSrc + '" alt="' + esc(produk) + '"></div>\n';

    /* Form order */
    if (useForm) {
      html += formSection(color);
    }

    html += '</body>\n</html>';
    return html;
  }

  function pageCSS(color) {
    return ':root{--c:' + color + '}'
      + '*{box-sizing:border-box;margin:0;padding:0}'
      + 'body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#000;color:#1f2937}'
      + '.hero{width:100%;line-height:0}'
      + '.hero img{width:100%;height:auto;display:block}'
      + '.order{background:#f9fafb;padding:32px 16px}'
      + '.order-box{max-width:480px;margin:0 auto;background:#fff;border-radius:14px;padding:26px 22px;box-shadow:0 6px 20px rgba(0,0,0,.1)}'
      + '.order-box h2{text-align:center;font-size:1.15rem;margin-bottom:6px}'
      + '.price-tag{text-align:center;margin-bottom:20px}'
      + '.price-tag .p{font-size:1.9rem;font-weight:800;color:var(--c)}'
      + '.price-tag .n{font-size:.78rem;color:#9ca3af}'
      + '.fg{margin-bottom:13px}'
      + '.fg label{display:block;font-size:.84rem;font-weight:600;margin-bottom:3px;color:#374151}'
      + '.fg .req{color:#dc2626}'
      + '.fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:.93rem;font-family:inherit}'
      + '.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--c);box-shadow:0 0 0 3px color-mix(in srgb,var(--c) 15%,transparent)}'
      + '.fg textarea{resize:vertical;min-height:70px}'
      + '.fg .hint{font-size:.74rem;color:#9ca3af;margin-top:2px}'
      + '.fg .err{font-size:.78rem;color:#dc2626;margin-top:2px;display:none}'
      + '.fg.bad input,.fg.bad select,.fg.bad textarea{border-color:#dc2626}'
      + '.fg.bad .err{display:block}'
      + '.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}'
      + '@media(max-width:460px){.row2{grid-template-columns:1fr}}'
      + '.totals{background:#f3f4f6;border-radius:8px;padding:12px;margin-bottom:14px}'
      + '.trow{display:flex;justify-content:space-between;font-size:.86rem;padding:3px 0}'
      + '.trow.big{font-size:1rem;font-weight:700;padding-top:9px;margin-top:6px;border-top:2px solid #e5e7eb}'
      + '.trow.big span:last-child{color:var(--c)}'
      + '.ship-note{background:#eff6ff;border:1px solid #bfdbfe;border-radius:7px;padding:9px 11px;font-size:.83rem;color:#1e40af;margin-top:5px;display:none}'
      + '.btn-order{width:100%;padding:14px;background:var(--c);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}'
      + '.btn-order:hover{filter:brightness(1.1)}'
      + '.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}'
      + '.btn-order.loading .spinner{display:block}.btn-order.loading .lbl{display:none}'
      + '@keyframes spin{to{transform:rotate(360deg)}}'
      + '.msg{padding:13px;border-radius:8px;text-align:center;margin-top:12px;display:none}'
      + '.msg.on{display:block}'
      + '.msg.ok{background:#dcfce7;color:#166534;border:1px solid #86efac}'
      + '.msg.er{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}'
      + '.msg a{color:inherit;font-weight:700;display:block;margin-top:6px}';
  }

  function pixelSnippet(pid) {
    return '<script>!function(f,b,e,v,n,t,s){'
      + 'if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};'
      + 'if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version="2.0";n.queue=[];'
      + 't=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];'
      + 's.parentNode.insertBefore(t,s)}(window,document,"script","https://connect.facebook.net/en_US/fbevents.js");'
      + 'fbq("init","' + pid + '");fbq("track","PageView");<\/script>\n';
  }

  function formSection(color) {
    var produk  = gv('bProductName') || 'Produk';
    var price   = parseInt(gv('bPrice')) || 99000;
    var webhook = gv('bWebhook') || '';
    var waNum   = gv('bWaNumber') || '';

    var optsHtml = options.map(function (o) {
      return '<option value="' + esc(o) + '">' + esc(o) + '</option>';
    }).join('');

    var wilayahHtml = rates.map(function (r, i) {
      return '<option value="' + i + '">' + esc(r.wilayah)
        + ' — Rp ' + r.ongkir.toLocaleString('id-ID') + '</option>';
    }).join('');

    var cfg = {
      produk:  produk,
      harga:   price,
      opts:    options.slice(),
      webhook: webhook,
      wa:      waNum,
      rates:   rates.slice(),
      color:   color
    };

    return '<script>var _C=' + JSON.stringify(cfg) + ';<\/script>\n'
      + '<section class="order">\n'
      + '<div class="order-box">\n'
      + '<h2>Order ' + esc(produk) + '</h2>\n'
      + '<div class="price-tag"><div class="p">Rp ' + price.toLocaleString('id-ID') + '</div>'
      + '<div class="n">Harga spesial — stok terbatas</div></div>\n'
      + '<form id="oFrm" novalidate>\n'
      + _fg('Nama Lengkap', '<input type="text" name="nama" required placeholder="Nama lengkap Anda"><div class="err">Wajib diisi</div>')
      + _fg('Nomor WhatsApp', '<input type="tel" name="wa" required placeholder="08xxxxxxxxxx" pattern="^08[0-9]{8,13}$"><div class="hint">Format: 08xxxxxxxxxx</div><div class="err">Nomor WA tidak valid</div>')
      + _fg('Alamat Lengkap', '<textarea name="alamat" required placeholder="Jalan, RT/RW, Kelurahan, Kode Pos"></textarea><div class="err">Wajib diisi</div>')
      + '<div class="row2">'
      + _fg('Kecamatan', '<input type="text" name="kecamatan" placeholder="Kecamatan">')
      + _fg('Kota/Kab', '<input type="text" name="kota" placeholder="Kota">')
      + '</div>\n'
      + _fg('Pilihan Produk', '<select name="produk" id="sProduk" required onchange="hCalc()"><option value="">— Pilih —</option>' + optsHtml + '</select>')
      + _fg('Jumlah', '<input type="number" name="qty" value="1" min="1" max="99" onchange="hCalc()">')
      + _fg('Wilayah Pengiriman', '<select name="wilayahIdx" id="sWilayah" required onchange="hWilayah()"><option value="">— Pilih wilayah —</option>' + wilayahHtml + '</select><div class="ship-note" id="shipNote"></div>')
      + '<input type="hidden" name="ongkir" id="hOngkir" value="0">\n'
      + '<div class="totals">'
      + '<div class="trow"><span>Subtotal</span><strong id="tSub">Rp 0</strong></div>'
      + '<div class="trow"><span>Ongkir</span><strong id="tOngkir">Rp 0</strong></div>'
      + '<div class="trow big"><span>Total</span><span id="tTotal">Rp 0</span></div>'
      + '</div>\n'
      + _fg('Metode Bayar', '<select name="bayar" required><option value="">— Pilih —</option><option>Transfer BCA</option><option>Transfer Mandiri</option><option>COD (Bayar di Tempat)</option></select>')
      + _fg('Catatan', '<textarea name="catatan" rows="2" placeholder="Catatan tambahan (opsional)"></textarea>')
      + '<button type="submit" class="btn-order" id="btnOrd"><span class="spinner"></span><span class="lbl">Kirim Order Sekarang 🚀</span></button>\n'
      + '</form>\n'
      + '<div class="msg ok" id="mOk">✅ Order berhasil dikirim! CS akan hubungi via WhatsApp.<a id="waOk" href="#" target="_blank">Chat via WhatsApp →</a></div>\n'
      + '<div class="msg er" id="mEr">❌ Gagal kirim. Coba lagi atau order via WA.<a id="waEr" href="#" target="_blank">Order via WhatsApp →</a></div>\n'
      + '</div>\n</section>\n'
      + '<script>\n(function(){\n'
      + 'var C=_C,ok=0,sub=0;\n'
      + 'document.documentElement.style.setProperty("--c",C.color);\n'
      + 'function fmt(n){return"Rp "+n.toLocaleString("id-ID");}\n'
      + 'function waHref(n){return"https://wa.me/"+C.wa+"?text="+encodeURIComponent("Halo, saya mau order "+C.produk+" atas nama "+(n||""));}\n'
      + 'function hCalc(){'
      + 'var q=parseInt(document.querySelector("[name=qty]").value)||1;'
      + 'sub=C.harga*q;'
      + 'var t=sub+ok;'
      + 'document.getElementById("tSub").textContent=fmt(sub);'
      + 'document.getElementById("tOngkir").textContent=ok?fmt(ok):"Gratis";'
      + 'document.getElementById("tTotal").textContent=fmt(t);'
      + '}\n'
      + 'window.hCalc=hCalc;hCalc();\n'
      + 'window.hWilayah=function(){'
      + 'var s=document.getElementById("sWilayah"),idx=parseInt(s.value);'
      + 'var note=document.getElementById("shipNote");'
      + 'if(isNaN(idx)){ok=0;note.style.display="none";hCalc();return;}'
      + 'var r=C.rates[idx];ok=r.ongkir;'
      + 'document.getElementById("hOngkir").value=r.ongkir;'
      + 'note.textContent="Estimasi: "+r.estimasi;note.style.display="block";'
      + 'hCalc();'
      + '};\n'
      + 'function validate(){'
      + 'var ok=true;'
      + 'document.querySelectorAll("[required]").forEach(function(f){'
      + 'var g=f.closest(".fg");if(g)g.classList.remove("bad");'
      + 'var empty=f.tagName==="SELECT"?!f.value:!f.value.trim();'
      + 'var pat=f.pattern&&!new RegExp(f.pattern).test(f.value);'
      + 'if(empty||pat){if(g)g.classList.add("bad");ok=false;}'
      + '});return ok;'
      + '}\n'
      + 'document.getElementById("oFrm").addEventListener("submit",function(e){'
      + 'e.preventDefault();if(!validate())return;'
      + 'var btn=document.getElementById("btnOrd");'
      + 'var fd=new FormData(e.target);'
      + 'var qty=parseInt(fd.get("qty"))||1,total=sub+ok;'
      + 'var data={'
      + 'nama:fd.get("nama"),wa:fd.get("wa"),alamat:fd.get("alamat"),'
      + 'kecamatan:fd.get("kecamatan")||"",kota:fd.get("kota")||"",'
      + 'produk:fd.get("produk"),qty:qty,ongkir:ok,total:total,'
      + 'bayar:fd.get("bayar"),catatan:fd.get("catatan")||"",'
      + 'src:window.location.pathname'
      + '};'
      + 'btn.classList.add("loading");btn.disabled=true;'
      + 'document.getElementById("mOk").classList.remove("on");'
      + 'document.getElementById("mEr").classList.remove("on");'
      + 'fetch(C.webhook,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)})'
      + '.then(function(){'
      + 'btn.classList.remove("loading");btn.disabled=false;'
      + 'var mok=document.getElementById("mOk");mok.classList.add("on");'
      + 'document.getElementById("waOk").href=waHref(data.nama);'
      + 'if(typeof fbq==="function")fbq("track","Purchase",{value:total,currency:"IDR"});'
      + 'e.target.reset();hCalc();'
      + '})'
      + '.catch(function(){'
      + 'btn.classList.remove("loading");btn.disabled=false;'
      + 'document.getElementById("mEr").classList.add("on");'
      + 'document.getElementById("waEr").href=waHref("");'
      + '});'
      + '});\n'
      + '})();\n<\/script>\n';
  }

  function _fg(label, inner) {
    return '<div class="fg"><label>' + label + '</label>' + inner + '</div>\n';
  }

  /* ── Download / Copy ── */
  el('btnDownload').addEventListener('click', function () {
    var blob = new Blob([buildHTML()], { type: 'text/html' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = (gv('bProductName') || 'landing-page').replace(/[^a-z0-9]/gi, '-').toLowerCase() + '.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(a.href); }, 1000);
  });

  el('btnCopy').addEventListener('click', function () {
    var html = buildHTML();
    navigator.clipboard.writeText(html)
      .then(function () { alert('HTML berhasil di-copy!'); })
      .catch(function () {
        var ta = document.createElement('textarea');
        ta.value = html;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        alert('HTML berhasil di-copy!');
      });
  });

  /* ── Helpers ── */
  function el(id) { return document.getElementById(id); }
  function gv(id) { var e = el(id); return e ? e.value : ''; }
  function show(id) { var e = el(id); if (e) e.style.display = 'block'; }
  function esc(s) {
    return s ? s.replace(/&/g, '&amp;').replace(/</g, '&lt;')
               .replace(/>/g, '&gt;').replace(/"/g, '&quot;') : '';
  }

  /* Initial preview */
  setTimeout(doPreview, 200);

})();
</script>
</body>
</html>
